<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Importo a fonte Poppins igual às outras páginas do projeto. -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <title>Copa Tickets - Login</title>

    <!-- Ficheiro CSS partilhado entre a página de login e de cadastro. -->
    <link rel="stylesheet" href="logincadastro.css">
</head>

<body>

<!-- Header fixo com o logotipo à esquerda e navegação à direita,
     igual ao padrão das outras páginas do site. -->
<header>
    <a href="index.html"><img src="flags/logo 3 - Editado.png" alt="Brazil Tickets" class="logo"></a>
    <nav>
        <a href="index.html">Início</a>
        <a href="LOGIN.html">Login</a>
        <a href="INGRESSOS.html">Ingressos</a>
        <a href="#" class="nav-cart">🛒 Carrinho</a>
    </nav>
</header>

<!-- Layout principal dividido em duas colunas:
     lado esquerdo com o formulário e lado direito com o texto. -->
<div class="main-content">

    <!-- COLUNA ESQUERDA — formulário de login -->
    <div class="container">
        <h2>Faça Login</h2>

        <form method="post">

            <!-- Campos de email e senha com validação básica do HTML. -->
            <input type="email" name="Email" placeholder="Email" required />
            <input type="password" name="Senha" placeholder="Senha" required />

            <!-- Botão de entrar — redireciona para a homepage quando clicado.
                 A autenticação real será implementada futuramente. -->
            <button class="btn-entrar" type="button" onclick="window.location.href='homepage.html'">
             ENTRAR
            </button>
            <br>
            <p>
                Não possui conta?
                <a href="CADASTRO.html">Clique aqui</a>
            </p>

            <!-- Secção de login social com ícones de Email, Facebook e Outlook.
                 Por agora mostram uma mensagem de "erro" ao ser clicados. -->
            <div class="login-box">
                <h4>ENTRE COM</h4>
                <div class="social-icons">
                    <button type="button" class="btn" onclick="mostrarMensagem()">
                        <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Email">
                    </button>
                    <button type="button" class="btn" onclick="mostrarMensagem()">
                        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
                    </button>
                    <button type="button" class="btn" onclick="mostrarMensagem()">
                        <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png" alt="Outlook">
                    </button>
                </div>
            </div>
        </form>

    </div>

    <!-- COLUNA DIREITA — imagem de fundo com texto sobreposto. -->
    <div class="side-image">
        <br><br><br><br><br><br><br><br><br><br><br>
        <div class="side-text">
            <h1>O MELHOR SITE DE VENDAS DE INGRESSOS DO BRASIL</h1>
            <br>
            <p>Garanta seu lugar na história. A Copa começa aqui.</p>
        </div>
    </div>
</div>

<!-- Script no final do ficheiro, como boa prática de organização de código.
     Coloco sempre o JavaScript como último elemento antes do </body>
     para garantir que o HTML já foi carregado antes de o script correr. -->
<script>
    /* Função chamada pelos botões de login social (Email, Facebook, Outlook).
       Por enquanto apenas informa o utilizador que a funcionalidade
       ainda não está disponível, mas será implementada futuramente. */
    function mostrarMensagem() {
        alert('Funcionalidade de login por rede social ainda não disponível.');
    }
</script>
</body>

</html>
